<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E85A3F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C1452D;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg_grad)" />

  <!-- Radial Glow -->
  <circle cx="512" cy="512" r="400" fill="white" fill-opacity="0.05" />

  <!-- Meter Arc Base -->
  <path d="M212 712 A 340 340 0 1 1 812 712" stroke="white" stroke-width="64" stroke-linecap="round" stroke-opacity="0.2" fill="none" />
  
  <!-- Active Meter Accent -->
  <path d="M212 712 A 340 340 0 0 1 612 215" stroke="white" stroke-width="64" stroke-linecap="round" fill="none" filter="url(#glow)" />

  <!-- Central Sound Bar Visualizer -->
  <!-- Left Side -->
  <rect x="300" y="462" width="56" height="100" rx="28" fill="white" fill-opacity="0.3" />
  <rect x="400" y="362" width="56" height="300" rx="28" fill="white" fill-opacity="0.6" />
  
  <!-- Center Peak -->
  <rect x="500" y="262" width="56" height="500" rx="28" fill="white" />
  
  <!-- Right Side -->
  <rect x="600" y="362" width="56" height="300" rx="28" fill="white" fill-opacity="0.6" />
  <rect x="700" y="462" width="56" height="100" rx="28" fill="white" fill-opacity="0.3" />

  <!-- Subtle Glass Highlight -->
  <path d="M200 100 Q 512 50 824 100 C 900 120 950 200 950 300 Q 512 250 100 300 C 100 200 150 120 200 100 Z" fill="white" fill-opacity="0.1" />
</svg>
